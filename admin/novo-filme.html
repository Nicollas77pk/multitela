<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adicionar Filme - MultiTela CMS</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<header>

    <h1>MultiTela CMS</h1>

</header>



<main class="admin-container">


    <h2>Adicionar Novo Filme</h2>


    <section class="campo-busca">


        <h3>Buscar filme no TMDB</h3>


        <div class="barra-pesquisa">


            <input 
            type="text" 
            id="nomeFilme"
            placeholder="Digite o nome do filme">


            <button onclick="buscarFilme()">
                Buscar
            </button>


        </div>


    </section>




    <section id="resultadoBusca" class="resultado">


        <p>
            Digite um filme para começar a busca.
        </p>


    </section>




    <hr>




    <section class="dados-filme">


        <h3>Dados do Filme</h3>


        <label>
            Título
        </label>

        <input type="text" id="titulo">


        <label>
            Ano
        </label>

        <input type="text" id="ano">


        <label>
            Gênero
        </label>

        <input type="text" id="genero">


        <label>
            Diretor
        </label>

        <input type="text" id="diretor">


        <label>
            Sinopse
        </label>

        <textarea id="sinopse"></textarea>



        <label>
            Imagem Poster
        </label>

        <input type="text" id="imagem">


        <button 
class="salvar"
onclick="salvarFilme()">

Salvar Filme

</button>


    </section>



</main>



<script src="../config/config.js"></script>

<script src="../js/tmdb.js"></script>


</body>

</html>
