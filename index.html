<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MultiTela - Onde Assistir Filmes e Séries</title>

    <meta name="description"
        content="Descubra onde assistir filmes, séries, animes, doramas e documentários.">

    <link rel="icon" href="imagens/favicon.png">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="/css/autocomplete.css">

</head>

<body>


    <!-- HEADER -->

  <header class="header">

    <div class="container">

        <!-- LOGO -->

        <a href="/multitela/index.html" class="logo">

            <img
                src="/multitela/imagens/MultiTela.png"
                alt="MultiTela">

        </a>

        <!-- MENU MOBILE -->

        <button
            class="menu-toggle"
            id="menuToggle">

            ☰

        </button>

      <!-- MENU -->

<nav class="menu" id="menu">

    <a href="/multitela/">

        Home

    </a>

    <a href="/multitela/paginas/filmes.html">

        Filmes

    </a>

    <a href="/multitela/paginas/series.html">

        Séries

    </a>

    <a href="/multitela/paginas/animes.html">

        Animes

    </a>

    <a href="/multitela/paginas/desenhos.html">

        Desenhos

    </a>

    <a href="/multitela/paginas/doramas.html">

        Doramas

    </a>


        </div>

    </div>

</nav>
        
        <!-- BUSCA -->

        <div class="header-search">

            <input

                id="campoBusca"

                type="search"

                autocomplete="off"

                placeholder="Buscar filmes, séries, animes...">

            <button

                id="btnBusca">

                🔍

            </button>

            <div id="autocompleteBusca"></div>

        </div>

    </div>

</header>

    <!-- HERO -->

    <section id="hero">

       

        <div class="hero-overlay">

            <div class="hero-content">

                <span id="hero-tag">

                    Em destaque

                </span>

                <h1 id="hero-title">

                    Carregando...

                </h1>

                 <div class="hero-info-extra">

    <span id="hero-ano"></span>

    <span id="hero-genero"></span>

    <span id="hero-nota"></span>

</div>

                <p id="hero-description">

                </p>

                <div class="hero-buttons">

                    <button id="btnDetalhes">

                        Ver detalhes

                    </button>

                </div>

            </div>

        </div>

    </section>

    <!-- FILMES -->

    <section class="container secao">

        <div class="section-title">

            <h2>🎬 Filmes Populares</h2>

            <a href="paginas/filmes.html">

                Ver todos →

            </a>

        </div>

        <div class="slider">

            <button class="slider-btn prev">

                ❮

            </button>

            <div
                class="carrossel"
                id="carrossel-filmes">

            </div>

            <button class="slider-btn next">

                ❯

            </button>

        </div>

    </section>

    <!-- SERIES -->

    <section class="container secao">

        <div class="section-title">

            <h2>📺 Séries Populares</h2>

            <a href="paginas/series.html">

                Ver todos →

            </a>

        </div>

        <div class="slider">

            <button class="slider-btn prev">

                ❮

            </button>

            <div
                class="carrossel"
                id="carrossel-series">

            </div>

            <button class="slider-btn next">

                ❯

            </button>

        </div>

    </section>

    <!-- ANIMES -->

    <section class="container secao">

        <div class="section-title">

            <h2>🎌 Animes</h2>

            <a href="paginas/animes.html">

                Ver todos →

            </a>

        </div>

        <div class="slider">

            <button class="slider-btn prev">

                ❮

            </button>

            <div
                class="carrossel"
                id="carrossel-animes">

            </div>

            <button class="slider-btn next">

                ❯

            </button>

        </div>

    </section>

    <!-- NOVELAS -->

    <section class="container secao">

        <div class="section-title">

            <h2>🇧🇷 Novelas</h2>

            <a href="paginas/novelas.html">

                Ver todos →

            </a>

        </div>

        <div class="slider">

            <button class="slider-btn prev">

                ❮

            </button>

            <div
                class="carrossel"
                id="carrossel-novelas">

            </div>

            <button class="slider-btn next">

                ❯

            </button>

        </div>

    </section>

    <!-- MODAL -->

    <div id="modal" class="modal">

        <div class="modal-box">

            <div
                id="modalBanner"
                class="modal-banner">

                <button
                    id="fecharModal"
                    class="modal-close">

                    ✕

                </button>

            </div>

            <div class="modal-content">

                <h1 id="modalTitulo"></h1>

                <div
                    id="modalMeta"
                    class="modal-meta">

                </div>

                <p
                    id="modalDescricao"
                    class="modal-description">

                </p>

                <div id="modalTrailer">

</div>

                <div id="modalProviders">

                </div>


            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer>

        © 2026 MultiTela

    </footer>



<!-- JS MULTITELA 2.0 -->

<script src="js/config.js"></script>

<script src="js/api.js"></script>

<script src="js/utils.js"></script>

<script src="js/card.js"></script>

<script src="js/slider.js"></script>

<script src="js/modal.js"></script>

<script src="js/search.js"></script>

<script src="js/home.js"></script>

<script src="js/app.js"></script>
    
<script src="js/menu.js"></script>

</body>

</html>
