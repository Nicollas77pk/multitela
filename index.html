<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MultiTela - Onde Assistir Filmes e Séries</title>

    <meta name="description"
        content="Descubra onde assistir filmes, séries, animes, doramas e documentários.">

    <link rel="icon" href="imagens/favicon.png">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/footer.css">

</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="container">

            <a href="index.html" class="logo">

                MultiTela

            </a>

            <nav class="menu">

                <a href="paginas/filmes.html">Filmes</a>

                <a href="paginas/series.html">Séries</a>

                <a href="paginas/animes.html">Animes</a>

                <a href="paginas/doramas.html">Doramas</a>

                <a href="paginas/novelas.html">Novelas</a>

                <a href="paginas/documentarios.html">Documentários</a>

            </nav>

            <div class="header-right">

                <input
                    id="campoBusca"
                    type="text"
                    placeholder="Buscar filmes ou séries...">

                <button id="btnBusca">

                    🔍

                </button>

            </div>

        </div>

    </header>

    <!-- HERO -->

    <section id="hero">

        <div class="hero-overlay">

            <div class="hero-content">

                <span id="hero-tag">

                    Em destaque

                </span>

                <h1 id="hero-title">

                    Carregando...

                </h1>

                <p id="hero-description">

                </p>

                <div class="hero-buttons">

                    <button id="btnDetalhes">

                        Ver detalhes

                    </button>

                </div>

            </div>

        </div>

    </section>

    <!-- FILMES -->

    <section class="container secao">

        <div class="section-title">

            <h2>🎬 Filmes Populares</h2>

            <a href="paginas/filmes.html">

                Ver todos →

            </a>

        </div>

        <div class="slider">

            <button class="slider-btn prev">

                ❮

            </button>

            <div
                class="carrossel"
                id="carrossel-filmes">

            </div>

            <button class="slider-btn next">

                ❯

            </button>

        </div>

    </section>

    <!-- SERIES -->

    <section class="container secao">

        <div class="section-title">

            <h2>📺 Séries Populares</h2>

            <a href="paginas/series.html">

                Ver todos →

            </a>

        </div>

        <div class="slider">

            <button class="slider-btn prev">

                ❮

            </button>

            <div
                class="carrossel"
                id="carrossel-series">

            </div>

            <button class="slider-btn next">

                ❯

            </button>

        </div>

    </section>

    <!-- ANIMES -->

    <section class="container secao">

        <div class="section-title">

            <h2>🎌 Animes</h2>

            <a href="paginas/animes.html">

                Ver todos →

            </a>

        </div>

        <div class="slider">

            <button class="slider-btn prev">

                ❮

            </button>

            <div
                class="carrossel"
                id="carrossel-animes">

            </div>

            <button class="slider-btn next">

                ❯

            </button>

        </div>

    </section>

    <!-- NOVELAS -->

    <section class="container secao">

        <div class="section-title">

            <h2>🇧🇷 Novelas</h2>

            <a href="paginas/novelas.html">

                Ver todos →

            </a>

        </div>

        <div class="slider">

            <button class="slider-btn prev">

                ❮

            </button>

            <div
                class="carrossel"
                id="carrossel-novelas">

            </div>

            <button class="slider-btn next">

                ❯

            </button>

        </div>

    </section>

    <!-- MODAL -->

    <div id="modal" class="modal">

        <div class="modal-box">

            <div
                id="modalBanner"
                class="modal-banner">

                <button
                    id="fecharModal"
                    class="modal-close">

                    ✕

                </button>

            </div>

            <div class="modal-content">

                <h1 id="modalTitulo"></h1>

                <div
                    id="modalMeta"
                    class="modal-meta">

                </div>

                <p
                    id="modalDescricao"
                    class="modal-description">

                </p>

                <div id="modalProviders">

                </div>


                <div id="modalTrailer">

</div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer>

        © 2026 MultiTela

    </footer>

    <!-- JS -->

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/card.js"></script>
    <script src="js/slider.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/busca.js"></script>
    <script src="js/home.js"></script>

</body>

</html>
