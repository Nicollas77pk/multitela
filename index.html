<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Multi Tela - Onde Assistir Filmes, Séries, Animes e Novelas</title>

    <meta name="description" content="Descubra onde assistir filmes, séries, animes, novelas, doramas e documentários.">

 <link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/modal.css">
<link rel="stylesheet" href="css/footer.css">

</head>

<body>

    <!-- HEADER -->
<header class="header">

    <div class="logo">
        <a href="/">CanaisPuro</a>
    </div>

    <nav class="menu">

        <a href="paginas/filmes.html">Filmes</a>

        <a href="paginas/series.html">Séries</a>

        <a href="paginas/animes.html">Animes</a>

        <a href="paginas/doramas.html">Doramas</a>

        <a href="paginas/novelas.html">Novelas</a>

        <a href="paginas/documentarios.html">Documentários</a>

    </nav>

    <div class="header-right">

        <input
            type="text"
            id="campoBusca"
            placeholder="Buscar filmes, séries...">

        <button id="btnBusca">
            🔍
        </button>

    </div>

</header>



    <!-- HERO -->

    <section id="hero">

    </section>



<section class="secao">

    <div class="secao-header">

        <h2>🎬 Filmes Populares</h2>

        <a href="paginas/filmes.html">Ver todos →</a>

    </div>

    <div class="slider">

        <button class="slider-btn prev">
            ❮
        </button>

        <div
            class="carrossel"
            id="carrossel-filmes">

        </div>

        <button class="slider-btn next">
            ❯
        </button>

    </div>

</section>



    <!-- MELHORES -->

    <section>

        <h2>⭐ Melhores Filmes</h2>

        <div
            id="carrossel-filmes"
            class="carrossel">

        </div>

    </section>



    <!-- SÉRIES -->

    <section>

        <h2>📺 Séries</h2>

        <div
            id="carrossel-series"
            class="carrossel">

        </div>

    </section>



    <!-- ANIMES -->

    <section>

        <h2>🎌 Animes</h2>

        <div
            id="carrossel-animes"
            class="carrossel">

        </div>

    </section>



    <!-- NOVELAS -->

    <section>

        <h2>🇧🇷 Novelas</h2>

        <div
            id="carrossel-novelas"
            class="carrossel">

        </div>

    </section>



    <!-- MODAL -->

    <div
    id="modal"
    class="modal">

    <div class="modal-box">

        <div
            class="modal-banner"
            id="modalBanner">

            <button
                id="fecharModal"
                class="modal-close">

                ✕

            </button>

        </div>

        <div class="modal-content">

            <h1 id="modalTitulo">

            </h1>

            <div
                id="modalMeta"
                class="modal-meta">

            </div>

            <p
                id="modalDescricao"
                class="modal-description">

            </p>

            <div id="modalProviders">

            </div>

        </div>

    </div>

</div>



    <!-- FOOTER -->

    <footer>

        © 2026 Multitela

    </footer>



    <!-- JS -->

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/card.js"></script>
<script src="js/slider.js"></script>
<script src="js/modal.js"></script>
<script src="js/home.js"></script>

</body>

</html>
