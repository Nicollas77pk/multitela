<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"

    <meta name="description"
          content="Resultados da busca do MultiTela">

    <link rel="icon"
          href="../imagens/favicon.png">

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/cards.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/footer.css">

</head>

<body>

        <!-- HEADER -->

  <header class="header">

    <div class="container">

        <!-- LOGO -->

        <a href="/multitela/index.html" class="logo">

            <img
                src="/multitela/imagens/MultiTela.png"
                alt="MultiTela">

        </a>

        <!-- MENU MOBILE -->

        <button
            class="menu-toggle"
            id="menuToggle">

            ☰

        </button>

        <!-- MENU -->

        <nav
            class="menu"
            id="menu">

            <a href="/multitela/paginas/filmes.html">

                Filmes

            </a>

            <a href="/multitela/paginas/series.html">

                Séries

            </a>

            <a href="/multitela/paginas/animes.html">

                Animes

            </a>

            <a href="/multitela/paginas/doramas.html">

                Doramas

            </a>

            <a href="/multitela/paginas/novelas.html">

                Novelas

            </a>

            <a href="/multitela/paginas/documentarios.html">

                Documentários

            </a>

        </nav>

        <!-- BUSCA -->

        <div class="header-search">

            <input

                id="campoBusca"

                type="search"

                autocomplete="off"

                placeholder="Buscar filmes, séries, animes...">

            <button

                id="btnBusca">

                🔍

            </button>

            <div id="autocompleteBusca"></div>

        </div>

    </div>

</header>
    <!-- RESULTADOS -->

    <section class="container secao">

        <div class="section-title">

            <h2 id="tituloBusca">

                Resultados da busca

            </h2>

        </div>

        <div

            id="resultadoBusca"

            class="categoria-lista">

        </div>

    </section>

    <!-- MODAL -->

    <div id="modal" class="modal">

        <div class="modal-box">

            <div
                id="modalBanner"
                class="modal-banner">

                <button
                    id="fecharModal"
                    class="modal-close">

                    ✕

                </button>

            </div>

            <div class="modal-content">

                <h1 id="modalTitulo"></h1>

                <div
                    id="modalMeta"
                    class="modal-meta">

                </div>

                <p
                    id="modalDescricao"
                    class="modal-description">

                </p>




 <div id="modalTrailer">
    
    </div>



                

                <div id="modalProviders">

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer>

        © 2026 MultiTela

    </footer>

    <!-- JAVASCRIPT -->

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/card.js"></script>
    <script src="../js/modal.js"></script>
    <script src="../js/busca.js"></script>
    <script src="..js/autocomplete.js"></script>

</body>

</html>
